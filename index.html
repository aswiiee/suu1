<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: absolute;
      top: 0;
      left: 0;
      padding: 20px;
    }

    /* PAGE 1 */
    #page1 {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    /* PAGE 2 */
    #page2 {
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      display: none;
      color: white;
    }

    img {
      width: 260px;
      max-width: 80%;
      border-radius: 20px;
      margin: 15px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px;
      color: #d81b60;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 28px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }

    #yesBtn:hover {
      transform: scale(1.1);
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: absolute;
    }

    .finalText {
      font-size: 24px;
      margin: 10px 0;
      animation: fadeIn 1s ease;
    }

    .mainLove {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 15px;
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

  </style>
</head>

<body>

<!-- 💖 PAGE 1 -->
<div id="page1" class="page">

  <img src="your-image.jpg" alt="Us ❤️">

  <h1>Sanvi are you Thadichi 💖</h1>

  <button id="yesBtn" onclick="goToNextPage()">Yes ❤️</button>
  <button id="noBtn" onmouseover="moveNo()">No 😢</button>

</div>

<!-- ❤️ PAGE 2 -->
<div id="page2" class="page">

  <div class="mainLove">i love you shuttumani ❤️</div>

  <div class="finalText">Ante kuttyne njn mind akkathe alla busy ayi povunne konda 💭</div>
  <div class="finalText">Ante kutty anik nalla ishta ❤️</div>
  <div class="finalText">LOVE YOU SANNNN!! 😍🔥</div>

  <img src="your-image.jpg" alt="Love ❤️">

</div>

<script>
function goToNextPage() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";
}

function moveNo() {
  let btn = document.getElementById("noBtn");

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
